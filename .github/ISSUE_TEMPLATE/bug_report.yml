name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `jarvis`
        2. Say "Hey Jarvis, ..."
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / terminal output
      description: Paste any relevant output. This will be formatted as code.
      render: shell

  - type: dropdown
    id: mac
    attributes:
      label: Apple Silicon chip
      options:
        - M1
        - M1 Pro / Max / Ultra
        - M2
        - M2 Pro / Max / Ultra
        - M3
        - M3 Pro / Max / Ultra
        - M4
        - M4 Pro / Max / Ultra
    validations:
      required: true

  - type: input
    id: ram
    attributes:
      label: Unified Memory
      placeholder: "e.g. 8GB, 16GB"
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "e.g. 15.5"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.4"
    validations:
      required: true
